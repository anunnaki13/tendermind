services:
  api:
    build:
      context: ../apps/api
    env_file:
      - ../apps/api/.env
    ports:
      - "8011:8011"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8011
    depends_on:
      - postgres
      - mongo
      - redis
      - minio
      - qdrant

  web:
    build:
      context: ../apps/web
    env_file:
      - ../apps/web/.env
    ports:
      - "3010:3010"
    command: sh -c "npm run build && npm run start -- --hostname 0.0.0.0 --port 3010"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tendermind
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: tendermind
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: change_me
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data:/data

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6334:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  mongo_data:
  minio_data:
  qdrant_data:
